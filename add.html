<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NYA - Manage Content. </title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:#0a0a0a;
    color:#eee;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header{
    width:100%;
    background:#111;
    padding:16px 20px;
    border-bottom:1px solid #222;
    text-align:center;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#ff4466;
}
.logo span{ color:#fff; }

main{
    padding:20px;
    max-width:700px;
    width:100%;
}

form{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:25px;
    background:#111;
    border:1px solid #222;
    padding:18px;
    border-radius:10px;
}

input, select{
    padding:12px;
    border-radius:6px;
    border:1px solid #333;
    background:#1a1a1a;
    color:#eee;
    font-size:14px;
    outline:none;
}

input:focus, select:focus{
    border-color:#ff4466;
}

button{
    padding:12px;
    border-radius:6px;
    border:none;
    background:#ff4466;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{ background:#e03b5c; }

pre{
    margin-top:20px;
    background:#111;
    border:1px solid #222;
    padding:14px;
    border-radius:8px;
    overflow-x:auto;
    white-space:pre-wrap;
    word-wrap:break-word;
}

h1,h2{
    color:#ff4466;
    text-align:center;
}

label{
    font-size:14px;
    margin-top:20px;
    display:block;
}

.token-container{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.token-container input{ flex:1; }

/* deploy row */
.deploy-row{
    margin-top:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

#deployTime{
    color:#888;
    font-size:13px;
}

#refreshBtn{
    padding:6px 12px;
    border-radius:6px;
    border:none;
    background:#1a1a1a;
    color:#eee;
    cursor:pointer;
    font-size:12px;
}
#refreshBtn:hover{
    background:#222;
}
</style>
</head>

<body>

<header>
    <div class="logo">ny<span>a</span></div>
</header>

<main>

<h1>Manage Content</h1>

<div class="token-container">
    <input type="password" id="tokenInput" placeholder="GitHub Token" />
    <button id="setTokenBtn">Set Token</button>
</div>

<label for="fileSelect">Select Category:</label>
<select id="fileSelect">
    <option value="movies.txt">Movies</option>
    <option value="animes.txt" selected>Anime</option>
    <option value="tv.txt">TV</option>
    <option value="games.txt">Games</option>
</select>

<form id="addForm">
    <h2>Add Item</h2>
    <input type="text" id="addNa" placeholder="Name" required />
    <input type="text" id="addImg" placeholder="Image Path" required />
    <input type="text" id="addLnk" placeholder="Link" required />
    <button type="submit">Add</button>
</form>

<form id="removeForm">
    <h2>Remove Item</h2>
    <input type="text" id="removeKey" placeholder="Number or Name" required />
    <button type="submit">Remove</button>
</form>

<form id="replaceForm">
    <h2>Replace Item</h2>
    <input type="text" id="replaceKey" placeholder="Number or Name" required />
    <input type="number" id="repN" placeholder="New Number" required />
    <input type="text" id="repNa" placeholder="New Name" required />
    <input type="text" id="repImg" placeholder="New Image" required />
    <input type="text" id="repLnk" placeholder="New Link" required />
    <button type="submit">Replace</button>
</form>

<h2>Live File</h2>
<pre id="liveFile"></pre>

<h2>Response</h2>
<pre id="response"></pre>

<div class="deploy-row">
    <div id="deployTime"></div>
    <button id="refreshBtn">Refresh</button>
</div>

<script>

const OWNER = "micropositionings";
const REPO = "micropositionings.github.io";

let GITHUB_TOKEN = "";
let FILE_PATH = document.getElementById("fileSelect").value;

const responseEl = document.getElementById("response");
const liveEl = document.getElementById("liveFile");

const fileSelect = document.getElementById("fileSelect");

function updateDeployTime(){
    document.getElementById("deployTime").textContent =
        "Last update: " + new Date().toLocaleString();
}

document.getElementById("refreshBtn").addEventListener("click", async () => {
    const btn = document.getElementById("refreshBtn");

    btn.textContent = "Refreshing...";
    btn.disabled = true;

    await refreshLive();

    updateDeployTime();

    btn.textContent = "Refresh";
    btn.disabled = false;
});

function decodeBase64Unicode(str){
    return decodeURIComponent(escape(atob(str.replace(/\n/g,""))));
}

function encodeBase64Unicode(str){
    return btoa(unescape(encodeURIComponent(str)));
}

fileSelect.addEventListener("change", async () => {
    FILE_PATH = fileSelect.value;
    await refreshLive();
});

document.getElementById("setTokenBtn").addEventListener("click", async () => {
    const token = document.getElementById("tokenInput").value.trim();
    if(!token) return alert("Enter token");

    GITHUB_TOKEN = token;
    await refreshLive();
    updateDeployTime();

    alert("Token set!");
});

async function getFile(){
    if(!GITHUB_TOKEN){
        throw new Error("Enter GitHub token first");
    }

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`,
        { headers:{ Authorization:`token ${GITHUB_TOKEN}` } }
    );

    const data = await res.json();
    if(data.message) throw new Error(data.message);

    return data;
}

async function updateFile(newContent, sha, message){
    const encoded = encodeBase64Unicode(newContent);

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`,
        {
            method:"PUT",
            headers:{
                Authorization:`token ${GITHUB_TOKEN}`,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message,
                content:encoded,
                sha
            })
        }
    );

    return await res.json();
}

async function refreshLive(){
    try{
        const file = await getFile();
        const decoded = decodeBase64Unicode(file.content);
        liveEl.textContent = decoded;
    }catch(err){
        liveEl.textContent = "Error: " + err.message;
    }
}

/* ADD */
document.getElementById("addForm").addEventListener("submit", async e=>{
    e.preventDefault();

    const na = addNa.value.trim();
    const img = addImg.value.trim();
    const lnk = addLnk.value.trim();

    const file = await getFile();
    const sha = file.sha;

    const lines = decodeBase64Unicode(file.content)
        .split("\n").filter(l=>l.trim());

    let next = lines.length
        ? parseInt(lines[lines.length-1].split(",")[0]) + 1
        : 1;

    lines.push(`${next},${na},${img},${lnk}`);

    const data = await updateFile(lines.join("\n"), sha, `Add ${na}`);

    responseEl.textContent = JSON.stringify(data,null,2);
    await refreshLive();
    updateDeployTime();
});

/* REMOVE */
document.getElementById("removeForm").addEventListener("submit", async e=>{
    e.preventDefault();

    const key = removeKey.value.trim().toLowerCase();

    const file = await getFile();
    const sha = file.sha;

    const lines = decodeBase64Unicode(file.content)
        .split("\n").filter(l=>l.trim());

    const filtered = lines.filter(line=>{
        const [num,name] = line.split(",");
        return num.toLowerCase() !== key && name.toLowerCase() !== key;
    });

    const data = await updateFile(filtered.join("\n"), sha, `Remove ${key}`);

    responseEl.textContent = JSON.stringify(data,null,2);
    await refreshLive();
    updateDeployTime();
});

/* REPLACE */
document.getElementById("replaceForm").addEventListener("submit", async e=>{
    e.preventDefault();

    const key = replaceKey.value.trim().toLowerCase();

    const file = await getFile();
    const sha = file.sha;

    const updated = decodeBase64Unicode(file.content)
        .split("\n")
        .map(line=>{
            const [num,name] = line.split(",");
            if(num.toLowerCase()===key || name.toLowerCase()===key){
                return `${repN.value},${repNa.value},${repImg.value},${repLnk.value}`;
            }
            return line;
        });

    const data = await updateFile(updated.join("\n"), sha, `Replace ${key}`);

    responseEl.textContent = JSON.stringify(data,null,2);
    await refreshLive();
    updateDeployTime();
});

/* INIT */
refreshLive();

</script>

</body>
</html>
