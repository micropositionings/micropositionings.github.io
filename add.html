<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NYA - Manage Content</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:#0a0a0a;
    color:#eee;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header{
    width:100%;
    background:#111;
    padding:16px 20px;
    border-bottom:1px solid #222;
    text-align:center;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#ff4466;
}
.logo span{ color:#fff; }

main{
    padding:20px;
    max-width:700px;
    width:100%;
}

form{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:25px;
    background:#111;
    border:1px solid #222;
    padding:18px;
    border-radius:10px;
}

input, select{
    padding:12px;
    border-radius:6px;
    border:1px solid #333;
    background:#1a1a1a;
    color:#eee;
    font-size:14px;
    outline:none;
}

button{
    padding:12px;
    border-radius:6px;
    border:none;
    background:#ff4466;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

button:hover{ background:#e03b5c; }

pre{
    margin-top:20px;
    background:#111;
    border:1px solid #222;
    padding:14px;
    border-radius:8px;
    white-space:pre-wrap;
}

.token-container{
    display:flex;
    gap:10px;
}

.token-container input{ flex:1; }

.deploy-row{
    margin-top:10px;
    display:flex;
    gap:10px;
    justify-content:center;
    align-items:center;
}

#deployTime{
    color:#888;
    font-size:13px;
}

#refreshBtn{
    padding:6px 12px;
    background:#1a1a1a;
    border:1px solid #333;
}
</style>
</head>

<body>

<header>
    <div class="logo">ny<span>a</span></div>
</header>

<main>

<h1>Manage Content</h1>

<div class="token-container">
    <input type="password" id="tokenInput" placeholder="GitHub Token" />
    <button id="setTokenBtn">Set Token</button>
</div>

<label>Select Category:</label>
<select id="fileSelect">
    <option value="movies.txt">Movies</option>
    <option value="animes.txt" selected>Anime</option>
    <option value="tv.txt">TV</option>
    <option value="games.txt">Games</option>
</select>

<form id="addForm">
    <h2>Add Item</h2>
    <input id="addNa" placeholder="Name" required />
    <input id="addImg" placeholder="Image" required />
    <input id="addLnk" placeholder="Link" required />
    <button type="submit">Add</button>
</form>

<form id="removeForm">
    <h2>Remove Item</h2>
    <input id="removeKey" placeholder="Number or Name" required />
    <button type="submit">Remove</button>
</form>

<form id="replaceForm">
    <h2>Replace Item</h2>
    <input id="replaceKey" placeholder="Key" required />
    <input id="repN" placeholder="New ID" required />
    <input id="repNa" placeholder="New Name" required />
    <input id="repImg" placeholder="New Image" required />
    <input id="repLnk" placeholder="New Link" required />
    <button type="submit">Replace</button>
</form>

<h2>Live File</h2>
<pre id="liveFile"></pre>

<h2>Response</h2>
<pre id="response"></pre>

<div class="deploy-row">
    <div id="deployTime">Not saved yet</div>
    <button id="refreshBtn">Refresh</button>
</div>

<script>

const OWNER = "micropositionings";
const REPO = "micropositionings.github.io";

let TOKEN = "";
let FILE = document.getElementById("fileSelect").value;

const live = document.getElementById("liveFile");
const res = document.getElementById("response");
const deploy = document.getElementById("deployTime");

/* TOKEN FIX */
document.getElementById("setTokenBtn").onclick = () => {
    const t = document.getElementById("tokenInput").value.trim();
    if (!t) return alert("Enter token");

    TOKEN = t;
    alert("Token set!");
    loadFile();
};

/* FILE SWITCH */
document.getElementById("fileSelect").onchange = async (e) => {
    FILE = e.target.value;
    await loadFile();
};

/* FORMAT = ID|NAME|IMG|LINK */
function encodeLine(id, name, img, link){
    return `${id}|${name}|${img}|${link}`;
}

function decodeLine(line){
    return line.split("|").map(x => x.trim());
}

/* GITHUB */
async function getFile(){
    const r = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
        { headers:{ Authorization:`token ${TOKEN}` } }
    );
    const d = await r.json();
    if (d.message) throw new Error(d.message);
    return d;
}

async function save(content, sha, msg){
    const r = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
        {
            method:"PUT",
            headers:{
                Authorization:`token ${TOKEN}`,
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                message: msg,
                content: btoa(unescape(encodeURIComponent(content))),
                sha
            })
        }
    );

    return r.json();
}

/* LOAD */
async function loadFile(){
    if (!TOKEN) {
        live.textContent = "Set token first";
        return;
    }

    const f = await getFile();
    live.textContent = decodeURIComponent(escape(atob(f.content)));
}

/* REFRESH BUTTON */
document.getElementById("refreshBtn").onclick = loadFile;

/* ADD */
document.getElementById("addForm").onsubmit = async (e) => {
    e.preventDefault();
    if (!TOKEN) return alert("Set token first");

    const f = await getFile();
    const sha = f.sha;

    let lines = decodeURIComponent(escape(atob(f.content)))
        .split("\n")
        .filter(Boolean);

    const next = lines.length ? parseInt(lines.at(-1).split("|")[0]) + 1 : 1;

    lines.push(encodeLine(
        next,
        addNa.value,
        addImg.value,
        addLnk.value
    ));

    await save(lines.join("\n"), sha, "Add item");

    res.textContent = "Added";
    await loadFile();
};

/* REMOVE */
document.getElementById("removeForm").onsubmit = async (e) => {
    e.preventDefault();

    const key = removeKey.value.toLowerCase();

    const f = await getFile();
    const sha = f.sha;

    let lines = decodeURIComponent(escape(atob(f.content)))
        .split("\n");

    lines = lines.filter(l => {
        const p = decodeLine(l);
        return p[0]?.toLowerCase() !== key && p[1]?.toLowerCase() !== key;
    });

    await save(lines.join("\n"), sha, "Remove item");

    await loadFile();
};

/* REPLACE */
document.getElementById("replaceForm").onsubmit = async (e) => {
    e.preventDefault();

    const key = replaceKey.value.toLowerCase();

    const f = await getFile();
    const sha = f.sha;

    let lines = decodeURIComponent(escape(atob(f.content)))
        .split("\n");

    lines = lines.map(l => {
        const p = decodeLine(l);

        if (p[0]?.toLowerCase() === key || p[1]?.toLowerCase() === key) {
            return encodeLine(
                repN.value,
                repNa.value,
                repImg.value,
                repLnk.value
            );
        }

        return l;
    });

    await save(lines.join("\n"), sha, "Replace item");

    await loadFile();
};

</script>

</main>
</body>
</html>
