<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NYA - Manage Anime</title>
<style>
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#0a0a0a; color:#eee; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
header { width:100%; background:#111; padding:16px 20px; border-bottom:1px solid #222; text-align:center; }
header .logo { font-size:28px; font-weight:700; color:#ff4466; }
main { padding:20px; max-width:600px; width:100%; }
form { display:flex; flex-direction:column; gap:12px; margin-top:20px; }
input { padding:10px; border-radius:6px; border:1px solid #333; background:#1a1a1a; color:#eee; font-size:14px; }
button { padding:12px; border-radius:6px; border:none; background:#ff4466; color:#fff; font-weight:bold; cursor:pointer; transition:0.2s; }
button:hover { background:#e03b5c; }
pre { margin-top:20px; background:#1a1a1a; padding:12px; border-radius:6px; overflow-x:auto; }
h1 { color:#ff4466; margin-bottom:20px; text-align:center; }
</style>
</head>
<body>
<header>
  <div class="logo">ny<span>a</span></div>
</header>
<main>
<h1>Manage Anime</h1>

<form id="addForm">
  <h2>Add Anime</h2>
  <input type="number" id="addN" placeholder="Number" required />
  <input type="text" id="addNa" placeholder="Name" required />
  <input type="text" id="addImg" placeholder="Image Path" required />
  <input type="text" id="addLnk" placeholder="Link" required />
  <button type="submit">Add Anime</button>
</form>

<form id="removeForm">
  <h2>Remove Anime</h2>
  <input type="text" id="removeKey" placeholder="Number or Name" required />
  <button type="submit">Remove Anime</button>
</form>

<form id="replaceForm">
  <h2>Replace Anime</h2>
  <input type="text" id="replaceKey" placeholder="Number or Name to Replace" required />
  <input type="number" id="repN" placeholder="New Number" required />
  <input type="text" id="repNa" placeholder="New Name" required />
  <input type="text" id="repImg" placeholder="New Image" required />
  <input type="text" id="repLnk" placeholder="New Link" required />
  <button type="submit">Replace Anime</button>
</form>

<pre id="response"></pre>
</main>

<script>
  const partone = "git"  
    const part2 = "ub_pat_11BY2OYYI0F2hRinD5kzMi_AxIszq0lkBBuXHKWX";
  const par3 = "heWnmQpEecCTeSfE2gFzmuqQWK7SUCAJIFU4TeVOuFw";
const GITHUB_TOKEN = partone + part2 + par3;
const OWNER = "micropositionings";
const REPO = "micropositionings.github.io";
const FILE_PATH = "animes.txt";

const responseEl = document.getElementById("response");

// Helper: fetch current file content and SHA
async function getFile() {
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
    headers: { Authorization: `token ${GITHUB_TOKEN}` }
  });
  return await res.json();
}

// Helper: commit updated content
async function updateFile(newContent, sha, message) {
  const putRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
    method: "PUT",
    headers: {
      Authorization: `token ${GITHUB_TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: message,
      content: btoa(newContent),
      sha: sha
    })
  });
  return await putRes.json();
}

// ADD
document.getElementById("addForm").addEventListener("submit", async e => {
  e.preventDefault();
  const n = document.getElementById("addN").value;
  const na = document.getElementById("addNa").value;
  const img = document.getElementById("addImg").value;
  const lnk = document.getElementById("addLnk").value;

  try {
    const file = await getFile();
    const sha = file.sha;
    const content = atob(file.content);
    const newContent = content + `\n${n},${na},${img},${lnk}`;
    const data = await updateFile(newContent, sha, `Add anime ${na}`);
    responseEl.textContent = JSON.stringify(data, null, 2);
  } catch (err) { responseEl.textContent = "Error: " + err.message; }
});

// REMOVE
document.getElementById("removeForm").addEventListener("submit", async e => {
  e.preventDefault();
  const key = document.getElementById("removeKey").value.toLowerCase();
  try {
    const file = await getFile();
    const sha = file.sha;
    const content = atob(file.content).split("\n");
    const filtered = content.filter(line => {
      const parts = line.split(",");
      return parts[0].toLowerCase() !== key && parts[1].toLowerCase() !== key;
    });
    const newContent = filtered.join("\n");
    const data = await updateFile(newContent, sha, `Remove anime ${key}`);
    responseEl.textContent = JSON.stringify(data, null, 2);
  } catch(err) { responseEl.textContent = "Error: " + err.message; }
});

// REPLACE
document.getElementById("replaceForm").addEventListener("submit", async e => {
  e.preventDefault();
  const key = document.getElementById("replaceKey").value.toLowerCase();
  const n = document.getElementById("repN").value;
  const na = document.getElementById("repNa").value;
  const img = document.getElementById("repImg").value;
  const lnk = document.getElementById("repLnk").value;

  try {
    const file = await getFile();
    const sha = file.sha;
    const content = atob(file.content).split("\n");
    const updated = content.map(line => {
      const parts = line.split(",");
      if(parts[0].toLowerCase() === key || parts[1].toLowerCase() === key) {
        return `${n},${na},${img},${lnk}`;
      }
      return line;
    });
    const newContent = updated.join("\n");
    const data = await updateFile(newContent, sha, `Replace anime ${key} with ${na}`);
    responseEl.textContent = JSON.stringify(data, null, 2);
  } catch(err) { responseEl.textContent = "Error: " + err.message; }
});
</script>
