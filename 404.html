<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYA - Streaming</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23ff4466' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      color-scheme: dark;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
    }

    body { display: flex; flex-direction: column; overflow-x: hidden; }

    .header {
      background: #111;
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo { font-size: 28px; font-weight: 700; }
    .logo-a { color: #ff4466; }

    .nav-tabs { display: flex; gap: 4px; overflow-x: auto; }

    .nav-tab {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid transparent;
      color: #999;
      cursor: pointer;
      border-radius: 3px;
    }

    .nav-tab.active {
      color: #fff;
      border-color: #ff4466;
      background: #1a1a1a;
    }

    .main-content { flex: 1; overflow-y: auto; }

    .hero {
      height: 320px;
      background: linear-gradient(135deg,#1a1a1a,#0f0f0f);
      display: flex;
      align-items: flex-end;
      padding: 48px 40px;
      margin-bottom: 40px;
    }

    .hero-title { font-size: 44px; font-weight: 800; }

    .section { padding: 0 40px 48px; }

    .cards-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }

    .card {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 2/3;
      background: #1a1a1a;
      border: 1px solid #222;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #ff4466;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 12px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      opacity: 0;
      transition: 0.2s;
    }

    .card:hover .card-info { opacity: 1; }

    .placeholder {
      text-align: center;
      padding: 60px;
      color: #555;
    }
  </style>
</head>

<body>
<header class="header">
  <div class="header-content">
    <div class="logo">ny<span class="logo-a">a</span></div>

    <nav class="nav-tabs">
      <button class="nav-tab active" data-category="movies">movies</button>
      <button class="nav-tab" data-category="animes">anime</button>
      <button class="nav-tab" data-category="tv">tv</button>
      <button class="nav-tab" data-category="games">games</button>
      <button class="nav-tab" data-category="proxies">proxies</button>
    </nav>
  </div>
</header>

<main class="main-content">
  <div class="hero">
    <div>
      <h1 class="hero-title" id="heroTitle">NYA</h1>
    </div>
  </div>

  <section class="section">
    <div class="cards-grid" id="contentGrid"></div>
  </section>
</main>

<script>
const categoryInfo = {
  movies: { title: 'Movies', tag: 'Cinema' },
  animes: { title: 'Anime', tag: 'Animation' },
  tv: { title: 'TV', tag: 'Series' },
  games: { title: 'Games', tag: 'Gaming' },
  proxies: { title: 'Proxies', tag: 'Network' }
};

let currentCategory = 'movies';

/* =========================
   FAST + ROBUST LOADER
========================= */

async function loadFromFile(category) {
  try {
    const response = await fetch(`${category}.txt?v=${Date.now()}`, {
      cache: "no-store"
    });

    if (!response.ok) {
      console.warn(`Missing file: ${category}.txt`);
      return [];
    }

    const text = await response.text();
    return parseItems(text);

  } catch (err) {
    console.error("Load error:", err);
    return [];
  }
}

/* =========================
   BULLETPROOF PARSER
========================= */

function parseItems(text) {
  if (!text) return [];

  const lines = text.replace(/\r/g, '').split('\n');
  const items = [];
  const seen = new Set();

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i].trim();
    if (!line) continue;
    if (line.startsWith("#") || line.startsWith("//")) continue;

    let parts = [];
    let current = "";
    let inQuotes = false;

    for (let c = 0; c < line.length; c++) {
      const ch = line[c];

      if (ch === '"' && line[c - 1] !== "\\") {
        inQuotes = !inQuotes;
        continue;
      }

      if (ch === "," && !inQuotes) {
        parts.push(current.trim());
        current = "";
        continue;
      }

      current += ch;
    }

    parts.push(current.trim());

    parts = parts.map(p =>
      p.replace(/^"(.*)"$/, "$1").replace(/\\"/g, '"').trim()
    );

    if (parts.length < 4) continue;

    const [id, title, image, link] = parts;

    if (!id || !title || !image || !link) continue;
    if (seen.has(id)) continue;

    seen.add(id);

    items.push({
      id,
      title,
      image,
      link
    });
  }

  return items;
}

/* =========================
   RENDER
========================= */

function renderItems(items) {
  const grid = document.getElementById("contentGrid");
  grid.innerHTML = "";

  if (!items.length) {
    grid.innerHTML = `<div class="placeholder">No content found</div>`;
    return;
  }

  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="card-image"
           src="${item.image}"
           onerror="this.src='https://via.placeholder.com/160x240?text=${encodeURIComponent(item.title)}'" />
      <div class="card-info">
        <div>${item.title}</div>
      </div>
    `;

    card.onclick = () => window.open(item.link, "_blank");
    grid.appendChild(card);
  });
}

/* =========================
   SWITCH CATEGORY
========================= */

async function switchCategory(category) {
  currentCategory = category;

  document.querySelectorAll(".nav-tab")
    .forEach(t => t.classList.remove("active"));

  document.querySelector(`[data-category="${category}"]`)
    .classList.add("active");

  const items = await loadFromFile(category);
  renderItems(items);
}

/* =========================
   EVENTS
========================= */

document.querySelectorAll(".nav-tab")
  .forEach(btn => {
    btn.addEventListener("click", () =>
      switchCategory(btn.dataset.category)
    );
  });

switchCategory("movies");
</script>
</body>
</html>
