<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYA - Streaming</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23ff4466' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      color-scheme: dark;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
    }
    
    body {
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .header {
      background: #111;
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-content {
      max-width: 100%;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    
    .logo-a {
      color: #ff4466;
    }
    
    .nav-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 0 4px;
    }
    
    .nav-tabs::-webkit-scrollbar {
      height: 4px;
    }
    
    .nav-tabs::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .nav-tabs::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px;
    }
    
    .nav-tab {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid transparent;
      color: #999;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      text-transform: capitalize;
      transition: all 0.2s;
      white-space: nowrap;
      border-radius: 3px;
    }
    
    .nav-tab:hover {
      color: #ddd;
      background: #1a1a1a;
    }
    
    .nav-tab.active {
      color: #fff;
      background: #1a1a1a;
      border-color: #ff4466;
    }
    
    .main-content {
      flex: 1;
      overflow-y: auto;
      background: #0a0a0a;
    }
    
    .main-content::-webkit-scrollbar {
      width: 10px;
    }
    
    .main-content::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    
    .main-content::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }
    
    .main-content::-webkit-scrollbar-thumb:hover {
      background: #444;
    }
    
    .hero {
      height: 320px;
      background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
      display: flex;
      align-items: flex-end;
      padding: 48px 40px;
      margin-bottom: 40px;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      right: -200px;
      width: 600px;
      height: 100%;
      background: radial-gradient(circle, rgba(255,68,102,0.1), transparent);
      pointer-events: none;
    }
    
    .hero-content {
      position: relative;
      z-index: 2;
    }
    
    .hero-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #ff4466;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    
    .hero-title {
      font-size: 44px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    
    .hero-desc {
      font-size: 15px;
      color: #999;
      max-width: 500px;
      line-height: 1.5;
    }
    
    .section {
      padding: 0 40px 48px;
    }
    
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }
    
    .cards-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    
    .card {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 2/3;
      background: #1a1a1a;
      border: 1px solid #222;
      transition: all 0.2s;
      group: 1;
    }
    
    .card:hover {
      transform: translateY(-6px);
      border-color: #ff4466;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6), 0 0 24px rgba(255,68,102,0.1);
    }
    
    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.25s;
    }
    
    .card:hover .card-image {
      filter: brightness(1.15) saturate(1.1);
    }
    
    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      padding: 20px 12px 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .card:hover .card-info {
      opacity: 1;
    }
    
    .card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    
    .card-meta {
      font-size: 11px;
      color: #666;
    }
    
    .placeholder {
      padding: 60px 20px;
      text-align: center;
      color: #555;
      font-size: 14px;
      grid-column: 1 / -1;
    }
    
    @media (max-width: 1200px) {
      .section {
        padding: 0 24px 40px;
      }
      
      .hero {
        padding: 36px 24px;
      }
      
      .hero-title {
        font-size: 36px;
      }
      
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
    }
    
    @media (max-width: 768px) {
      .header-content {
        gap: 12px;
      }
      
      .logo {
        font-size: 22px;
      }
      
      .nav-tabs {
        gap: 2px;
      }
      
      .nav-tab {
        padding: 6px 14px;
        font-size: 12px;
      }
      
      .hero {
        height: 240px;
        padding: 24px 16px;
        margin-bottom: 32px;
      }
      
      .hero-title {
        font-size: 28px;
      }
      
      .hero-desc {
        font-size: 14px;
      }
      
      .section {
        padding: 0 16px 32px;
      }
      
      .section-title {
        font-size: 18px;
        margin-bottom: 16px;
      }
      
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }
    }
    
    @media (max-width: 480px) {
      .header-content {
        gap: 8px;
      }
      
      .logo {
        font-size: 20px;
      }
      
      .nav-tab {
        padding: 6px 12px;
        font-size: 11px;
      }
      
      .hero {
        height: 180px;
        padding: 20px 12px;
        margin-bottom: 24px;
      }
      
      .hero-title {
        font-size: 22px;
      }
      
      .hero-desc {
        font-size: 13px;
      }
      
      .section {
        padding: 0 12px 24px;
      }
      
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">ny<span class="logo-a">a</span></div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-category="movies">movies</button>
        <button class="nav-tab" data-category="animes">anime</button>
        <button class="nav-tab" data-category="tv">tv</button>
        <button class="nav-tab" data-category="games">games</button>
        <button class="nav-tab" data-category="proxies">proxies</button>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="hero" id="heroSection">
      <div class="hero-content">
        <div class="hero-tag" id="heroTag">Featured</div>
        <h1 class="hero-title" id="heroTitle">NYA</h1>
        <p class="hero-desc" id="heroDesc">Explore thousands of titles across movies, anime, games and more.</p>
      </div>
    </div>

    <section class="section">
      <h2 class="section-title" id="sectionTitle">Movies</h2>
      <div class="cards-grid" id="contentGrid"></div>
    </section>
  </main>

  <script>
    const categoryInfo = {
      movies: { title: 'Movies', tag: 'Cinema' },
      animes: { title: 'Anime', tag: 'Animation' },
      tv: { title: 'TV', tag: 'Series' },
      games: { title: 'Games', tag: 'Gaming' },
      proxies: { title: 'Proxies', tag: 'Network' }
    };

    let currentCategory = 'movies';

    async function loadFromFile(category) {
      try {
        const filename = `${category}.txt`;
        const response = await fetch(filename);
        
        if (!response.ok) {
          console.warn(`Could not load ${filename}`);
          return [];
        }
        
        const text = await response.text();
        return parseItems(text);
      } catch (err) {
        console.error(`Error: ${err.message}`);
        return [];
      }
    }

    function parseItems(text) {
      if (!text || typeof text !== 'string') return [];
      
      const items = [];
      const lines = text.split('\n');
      
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        
        const parts = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < trimmed.length; i++) {
          const char = trimmed[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            parts.push(current.trim().replace(/^"|"$/g, ''));
            current = '';
          } else {
            current += char;
          }
        }
        parts.push(current.trim().replace(/^"|"$/g, ''));
        
        if (parts.length < 4) continue;
        
        const [id, title, image, link] = parts;
        if (title && image && link) {
          items.push({ title, image, link });
        }
      }
      
      return items;
    }

    function updateHero(items) {
      const item = items && items.length > 0 ? items[0] : null;
      
      if (item) {
        document.getElementById('heroTitle').textContent = item.title;
        document.getElementById('heroTag').textContent = categoryInfo[currentCategory].tag.toUpperCase();
        const domain = item.link.split('/')[2] || 'explore';
        document.getElementById('heroDesc').textContent = `Check out this featured ${categoryInfo[currentCategory].title.toLowerCase()}`;
      }
    }

    function renderItems(items) {
      const grid = document.getElementById('contentGrid');
      grid.innerHTML = '';
      
      if (!items.length) {
        grid.innerHTML = '<div class="placeholder">No content available</div>';
        return;
      }
      
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img class="card-image" src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/160x240?text=${encodeURIComponent(item.title)}&bg=1a1a1a'" />
          <div class="card-info">
            <div class="card-title">${item.title}</div>
            <div class="card-meta">tap to open</div>
          </div>
        `;
        card.addEventListener('click', () => {
          window.open(item.link, '_blank');
        });
        grid.appendChild(card);
      });
    }

    async function switchCategory(category) {
      currentCategory = category;
      
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-category="${category}"]`).classList.add('active');
      
      const info = categoryInfo[category];
      document.getElementById('sectionTitle').textContent = info.title;
      
      const items = await loadFromFile(category);
      updateHero(items);
      renderItems(items);
    }

    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => switchCategory(tab.dataset.category));
    });

    switchCategory('movies');
  </script>
</body>
</html>
