<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYA - Streaming</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23ff4466' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      color-scheme: dark;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f0f 100%);
      color: #e0e0e0;
      overflow-x: hidden;
      position: relative;
    }
    
    body {
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }
    
    .header {
      background: rgba(17, 17, 17, 0.95);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      animation: slideDown 0.6s ease-out;
    }
    
    @keyframes slideDown {
      from {
        transform: translateY(-120%) scale(0.95);
        opacity: 0;
        filter: blur(10px);
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
        filter: blur(0);
      }
    }
    
    .header-content {
      max-width: 100%;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .logo {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      white-space: nowrap;
      background: linear-gradient(135deg, #ff4466, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease-in-out infinite;
    }
    
    @keyframes glow {
      from {
        filter: drop-shadow(0 0 10px rgba(255, 68, 102, 0.6)) brightness(1);
      }
      to {
        filter: drop-shadow(0 0 25px rgba(255, 68, 102, 0.9)) brightness(1.1);
      }
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    @keyframes logoGlow {
      from {
        opacity: 0.5;
        transform: scale(0.95);
      }
      to {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }
    
    .logo-a {
      color: #ff4466;
    }
    
    .nav-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 0 4px;
    }
    
    .nav-tabs::-webkit-scrollbar {
      height: 4px;
    }
    
    .nav-tabs::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .nav-tabs::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px;
    }
    
    .nav-tab {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid transparent;
      color: #999;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      text-transform: capitalize;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    
    .nav-tab::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 68, 102, 0.1), transparent);
      transition: left 0.5s ease;
    }
    
    .nav-tab:hover::before {
      left: 100%;
    }
    
    .nav-tab:hover {
      color: #ddd;
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 68, 102, 0.15);
    }
    
    .nav-tab.active {
      color: #fff;
      background: linear-gradient(135deg, rgba(255, 68, 102, 0.2), rgba(255, 68, 102, 0.1));
      border-color: rgba(255, 68, 102, 0.5);
      box-shadow: 0 0 20px rgba(255, 68, 102, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 20px rgba(255, 68, 102, 0.3);
      }
      50% {
        box-shadow: 0 0 30px rgba(255, 68, 102, 0.5);
      }
    }
    
    .main-content {
      flex: 1;
      overflow-y: auto;
      background: linear-gradient(180deg, #0a0a0a 0%, #0f0f0f 50%, #0a0a0a 100%);
      animation: fadeIn 0.8s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .main-content::-webkit-scrollbar {
      width: 10px;
    }
    
    .main-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .main-content::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #ff4466, #ff6b9d);
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(255, 68, 102, 0.3);
    }
    
    .main-content::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #ff6b9d, #ff4466);
      box-shadow: 0 0 15px rgba(255, 68, 102, 0.5);
    }
    
    .hero {
      height: 320px;
      background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(15, 15, 15, 0.9) 100%);
      display: flex;
      align-items: flex-end;
      padding: 48px 40px;
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      animation: slideUp 0.8s ease-out 0.2s both;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      right: -200px;
      width: 400px;
      height: 100%;
      background: radial-gradient(circle, rgba(255,68,102,0.08), transparent);
      pointer-events: none;
    }
    

    

    
    .hero-content {
      position: relative;
      z-index: 2;
      animation: fadeInUp 1s ease-out 0.4s both;
    }
    
    @keyframes fadeInUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    .hero-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #ff4466;
      margin-bottom: 12px;
      opacity: 0.9;
      animation: bounceIn 0.6s ease-out 0.6s both;
    }
    
    @keyframes bounceIn {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      50% {
        transform: scale(1.05);
      }
      70% {
        transform: scale(0.9);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .hero-title {
      font-size: 44px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff, #ff4466);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 0.8s ease-out 0.8s both;
    }
    

    
    .hero-desc {
      font-size: 15px;
      color: #999;
      max-width: 500px;
      line-height: 1.5;
      animation: slideInLeft 0.8s ease-out 1s both;
    }
    
    @keyframes slideInLeft {
      from {
        transform: translateX(-30px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .section {
      padding: 0 40px 48px;
      animation: fadeInScale 0.8s ease-out 0.3s both;
    }
    
    @keyframes fadeInScale {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #ffffff, #ff4466);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleSlide 0.6s ease-out 0.5s both;
    }
    
    @keyframes titleSlide {
      from {
        transform: translateX(-20px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .cards-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      animation: staggerFadeIn 0.8s ease-out 0.6s both;
    }
    
    @keyframes staggerFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 2/3;
      background: linear-gradient(135deg, #1a1a1a, #222);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      group: 1;
      animation: cardLoad 0.6s ease-out both;
      animation-delay: calc(var(--card-index, 0) * 0.1s);
    }
    
    @keyframes cardLoad {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 68, 102, 0.5);
      box-shadow: 0 12px 24px rgba(0,0,0,0.6);
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,68,102,0.2), transparent);
      transition: left 0.6s ease;
      z-index: 1;
    }
    
    .card:hover::before {
      left: 100%;
    }
    
    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    
    .card:hover .card-image {
      transform: scale(1.03);
    }
    
    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7), transparent);
      padding: 24px 16px 16px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }
    
    .card:hover .card-info {
      opacity: 1;
      transform: translateY(0);
    }
    
    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      animation: textFadeIn 0.3s ease-out 0.2s both;
    }
    
    .card-meta {
      font-size: 11px;
      color: rgba(255, 68, 102, 0.9);
      font-weight: 500;
      animation: textFadeIn 0.3s ease-out 0.3s both;
    }
    
    @keyframes textFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .cards-grid.loading {
      opacity: 0.5;
      pointer-events: none;
    }
    
    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 68, 102, 0.3);
      border-top: 3px solid #ff4466;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 10;
    }
    
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    @media (max-width: 1200px) {
      .section {
        padding: 0 24px 40px;
      }
      
      .hero {
        padding: 36px 24px;
      }
      
      .hero-title {
        font-size: 36px;
      }
      
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
    }
    
    @media (max-width: 768px) {
      .header-content {
        gap: 12px;
      }
      
      .logo {
        font-size: 22px;
      }
      
      .nav-tabs {
        gap: 2px;
      }
      
      .nav-tab {
        padding: 6px 14px;
        font-size: 12px;
      }
      
      .hero {
        height: 240px;
        padding: 24px 16px;
        margin-bottom: 32px;
      }
      
      .hero-title {
        font-size: 28px;
      }
      
      .hero-desc {
        font-size: 14px;
      }
      
      .section {
        padding: 0 16px 32px;
      }
      
      .section-title {
        font-size: 18px;
        margin-bottom: 16px;
      }
      
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }
    }
    
    @media (max-width: 480px) {
      .header-content {
        gap: 8px;
      }
      
      .logo {
        font-size: 20px;
      }
      
      .nav-tab {
        padding: 6px 12px;
        font-size: 11px;
      }
      
      .hero {
        height: 180px;
        padding: 20px 12px;
        margin-bottom: 24px;
      }
      
      .hero-title {
        font-size: 22px;
      }
      
      .hero-desc {
        font-size: 13px;
      }
      
      .section {
        padding: 0 12px 24px;
      }
      
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">ny<span class="logo-a">a</span></div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-category="movies">movies</button>
        <button class="nav-tab" data-category="animes">anime</button>
        <button class="nav-tab" data-category="tv">tv</button>
        <button class="nav-tab" data-category="games">games</button>
        <button class="nav-tab" data-category="proxies">proxies</button>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="hero" id="heroSection">
      <div class="hero-content">
        <div class="hero-tag" id="heroTag">Featured</div>
        <h1 class="hero-title" id="heroTitle">NYA</h1>
        <p class="hero-desc" id="heroDesc">Explore thousands of titles across movies, anime, games and more.</p>
      </div>
    </div>

    <section class="section">
      <h2 class="section-title" id="sectionTitle">Movies</h2>
      <div class="cards-grid" id="contentGrid"></div>
    </section>
  </main>

  <script>
    const categoryInfo = {
      movies: { title: 'Movies', tag: 'Cinema' },
      animes: { title: 'Anime', tag: 'Animation' },
      tv: { title: 'TV', tag: 'Series' },
      games: { title: 'Games', tag: 'Gaming' },
      proxies: { title: 'Proxies', tag: 'Network' }
    };

    let currentCategory = 'movies';

    async function loadFromFile(category) {
      try {
        const filename = `${category}.txt`;
        const response = await fetch(filename);
        
        if (!response.ok) {
          console.warn(`Could not load ${filename}`);
          return [];
        }
        
        const text = await response.text();
        return parseItems(text);
      } catch (err) {
        console.error(`Error: ${err.message}`);
        return [];
      }
    }

    function parseItems(text) {
      if (!text || typeof text !== 'string') return [];
      
      const items = [];
      const lines = text.split('\n');
      
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        
        const parts = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < trimmed.length; i++) {
          const char = trimmed[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            parts.push(current.trim().replace(/^"|"$/g, ''));
            current = '';
          } else {
            current += char;
          }
        }
        parts.push(current.trim().replace(/^"|"$/g, ''));
        
        if (parts.length < 4) continue;
        
        const [id, title, image, link] = parts;
        if (title && image && link) {
          items.push({ title, image, link });
        }
      }
      
      return items;
    }

    function updateHero(items) {
      const heroSection = document.getElementById('heroSection');
      const item = items && items.length > 0 ? items[0] : null;
      
      if (item) {
        // Add fade out animation
        heroSection.style.opacity = '0';
        heroSection.style.transform = 'translateY(-10px)';
        
        setTimeout(() => {
          document.getElementById('heroTitle').textContent = item.title;
          document.getElementById('heroTag').textContent = categoryInfo[currentCategory].tag.toUpperCase();
          const domain = item.link.split('/')[2] || 'explore';
          document.getElementById('heroDesc').textContent = `Check out this featured ${categoryInfo[currentCategory].title.toLowerCase()}`;
          
          // Fade back in
          heroSection.style.opacity = '1';
          heroSection.style.transform = 'translateY(0)';
        }, 200);
      }
    }

    function renderItems(items) {
      const grid = document.getElementById('contentGrid');
      grid.innerHTML = '';
      
      if (!items.length) {
        grid.innerHTML = '<div class="placeholder">No content available</div>';
        return;
      }
      
      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.setProperty('--card-index', index);
        card.innerHTML = `
          <img class="card-image" src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/160x240?text=${encodeURIComponent(item.title)}&bg=1a1a1a'" loading="lazy" />
          <div class="card-info">
            <div class="card-title">${item.title}</div>
            <div class="card-meta">tap to open</div>
          </div>
        `;
        card.addEventListener('click', () => {
          window.open(item.link, '_blank');
        });
        grid.appendChild(card);
      });
    }

    async function switchCategory(category) {
      currentCategory = category;
      
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-category="${category}"]`).classList.add('active');
      
      const info = categoryInfo[category];
      document.getElementById('sectionTitle').textContent = info.title;
      
      // Show loading state
      const grid = document.getElementById('contentGrid');
      grid.classList.add('loading');
      grid.innerHTML = '<div class="loading-spinner"></div>';
      
      // Add a small delay for smooth transition
      await new Promise(resolve => setTimeout(resolve, 300));
      
      const items = await loadFromFile(category);
      updateHero(items);
      renderItems(items);
      
      // Remove loading state
      grid.classList.remove('loading');
    }

    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => switchCategory(tab.dataset.category));
    });

    // Add mouse follow effect to hero
    const hero = document.querySelector('.hero');
    hero.addEventListener('mousemove', (e) => {
      const rect = hero.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      
      hero.style.setProperty('--mouse-x', x);
      hero.style.setProperty('--mouse-y', y);
    });

    switchCategory('movies');
  </script>
</body>
</html>
