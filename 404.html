<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Lost</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #1a0000, #000);
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .container {
        text-align: center;
    }

    img {
        width: 320px;
        border-radius: 20px;
        box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    h1 {
        font-size: 5rem;
        margin: 20px 0 10px;
        color: #ff1a1a;
        text-shadow: 0 0 25px #ff0000;
    }

    p {
        color: #aaa;
        margin-bottom: 20px;
    }

    a {
        padding: 12px 25px;
        background: #ff1a1a;
        border-radius: 10px;
        color: white;
        text-decoration: none;
        transition: 0.3s;
    }

    a:hover {
        background: #ff3333;
        box-shadow: 0 0 15px #ff1a1a;
    }
</style>
</head>
<body>

<div class="container">
    <img src="img.png" alt="lost">
    <h1>404</h1>
    <p>you’re not supposed to be here...</p>
    <a href="/">go back</a>
</div>

</body>
</html>
