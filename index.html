<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYA - Streaming</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      color-scheme: dark;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
    }

    body { display: flex; flex-direction: column; overflow-x: hidden; }

    .header {
      background: #111;
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo { font-size: 28px; font-weight: 700; }
    .logo-a { color: #ff4466; }

    .nav-tabs { display: flex; gap: 4px; overflow-x: auto; }

    .nav-tab {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid transparent;
      color: #999;
      cursor: pointer;
      border-radius: 3px;
    }

    .nav-tab.active {
      color: #fff;
      border-color: #ff4466;
      background: #1a1a1a;
    }

    .main-content { flex: 1; overflow-y: auto; }

    .hero {
      height: 320px;
      background: linear-gradient(135deg,#1a1a1a,#0f0f0f);
      display: flex;
      align-items: flex-end;
      padding: 48px 40px;
      margin-bottom: 40px;
    }

    .hero-title { font-size: 44px; font-weight: 800; }

    .section { padding: 0 40px 48px; }

    .cards-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }

    .card {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 2/3;
      background: #1a1a1a;
      border: 1px solid #222;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #ff4466;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 12px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      opacity: 0;
      transition: 0.2s;
    }

    .card:hover .card-info { opacity: 1; }

    .placeholder {
      text-align: center;
      padding: 60px;
      color: #555;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="header-content">
    <div class="logo">ny<span class="logo-a">a</span></div>

    <nav class="nav-tabs">
      <button class="nav-tab active" data-category="movies">movies</button>
      <button class="nav-tab" data-category="animes">anime</button>
      <button class="nav-tab" data-category="tv">tv</button>
      <button class="nav-tab" data-category="games">games</button>
      <button class="nav-tab" data-category="proxies">proxies</button>
    </nav>
  </div>
</header>

<main class="main-content">
  <div class="hero">
    <div>
      <h1 class="hero-title" id="heroTitle">NYA</h1>
    </div>
  </div>

  <section class="section">
    <div class="cards-grid" id="contentGrid"></div>
  </section>
</main>

<script>

let currentCategory = "movies";

/* =========================
   LOAD FILE (NO CACHE)
========================= */

async function loadFromFile(category) {
  try {
    const res = await fetch(`${category}.txt?v=${Date.now()}`, {
      cache: "no-store"
    });

    if (!res.ok) return [];

    const text = await res.text();
    return parseItems(text);

  } catch (e) {
    console.error(e);
    return [];
  }
}

/* =========================
   🔥 UNIVERSAL PARSER (PIPE + CSV SAFE)
========================= */

function parseItems(text) {
  if (!text) return [];

  const lines = text.replace(/\r/g, "").split("\n");
  const items = [];
  const seen = new Set();

  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    if (line.startsWith("#") || line.startsWith("//")) continue;

    let id, title, image, link;

    /* -------------------------
       PIPE FORMAT (BEST)
       1|title|image|link
    ------------------------- */
    if (line.includes("|")) {
      [id, title, image, link] = line.split("|").map(x => x.trim());
    }

    /* -------------------------
       CSV FORMAT (fallback)
       supports commas in values
    ------------------------- */
    else {
      const parts = [];
      let cur = "";
      let inQ = false;

      for (let i = 0; i < line.length; i++) {
        const c = line[i];

        if (c === '"' && line[i - 1] !== "\\") {
          inQ = !inQ;
          continue;
        }

        if (c === "," && !inQ) {
          parts.push(cur);
          cur = "";
          continue;
        }

        cur += c;
      }

      parts.push(cur);

      [id, title, image, link] = parts.map(p =>
        p.replace(/^"(.*)"$/, "$1").replace(/\\"/g, '"').trim()
      );
    }

    if (!id || !title || !image || !link) continue;
    if (seen.has(id)) continue;

    seen.add(id);

    items.push({ id, title, image, link });
  }

  return items;
}

/* =========================
   RENDER
========================= */

function renderItems(items) {
  const grid = document.getElementById("contentGrid");
  grid.innerHTML = "";

  if (!items.length) {
    grid.innerHTML = `<div class="placeholder">No content found</div>`;
    return;
  }

  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="card-image"
        src="${item.image}"
        onerror="this.src='https://via.placeholder.com/160x240?text=${encodeURIComponent(item.title)}'"/>
      <div class="card-info">
        <div>${item.title}</div>
      </div>
    `;

    card.onclick = () => window.open(item.link, "_blank");
    grid.appendChild(card);
  });
}

/* =========================
   SWITCH CATEGORY
========================= */

async function switchCategory(cat) {
  currentCategory = cat;

  document.querySelectorAll(".nav-tab")
    .forEach(b => b.classList.remove("active"));

  document.querySelector(`[data-category="${cat}"]`)
    .classList.add("active");

  const items = await loadFromFile(cat);
  renderItems(items);
}

/* =========================
   EVENTS
========================= */

document.querySelectorAll(".nav-tab")
  .forEach(btn =>
    btn.addEventListener("click", () =>
      switchCategory(btn.dataset.category)
    )
  );

switchCategory("movies");

</script>

</body>
</html>
