<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>spasm</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #0a0a0a, #000);
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: white;
    }

    .card {
        width: 300px;
        padding: 40px 30px;
        border-radius: 24px;
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.08);
        text-align: center;
        box-shadow: 0 0 40px rgba(255,0,0,0.12);
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .pfp {
        width: 95px;
        height: 95px;
        border-radius: 50%;
        background-image: url("https://i.pinimg.com/736x/3a/c1/f8/3ac1f81b86903bc801d6f347d53c3b3b.jpg");
        background-size: cover;
        background-position: center;
        border: 2px solid #ff1a1a;
        box-shadow: 0 0 20px rgba(255,0,0,0.5);
        margin: 0 auto;
    }

    .name {
        margin-top: 12px;
        font-size: 1.6rem;
        font-weight: 600;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
    }

    .tag {
        font-size: 0.65rem;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(255,0,0,0.15);
        border: 1px solid rgba(255,0,0,0.4);
        color: #ff4d4d;
        letter-spacing: 0.5px;
        align-self: center;
    }

    .bio {
        margin-top: 10px;
        font-size: 0.9rem;
        color: #aaa;
    }

    /* Heart trail */
    .heart {
        position: fixed;
        font-size: 14px;
        color: #ff4d6d;
        pointer-events: none;
        animation: floatUp 0.8s linear forwards;
        z-index: 999;
    }

    @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-25px) scale(1.4); }
    }
</style>
</head>
<body>

<div class="card">
    <div class="pfp"></div>
    <div class="name">
        spasm
        <span class="tag">OWNER</span>
    </div>
    <div class="bio">all these niggas larp me</div>
</div>

<!-- Audio -->
<audio id="music" src="https://madoka.fit/song.mp3" loop></audio>

<script>
// Music - plays only once on first click anywhere on the page
let musicStarted = false;

document.body.addEventListener("click", () => {
    if (!musicStarted) {
        const audio = document.getElementById("music");
        audio.play().catch(err => {
            console.log("Music playback failed:", err);
        });
        musicStarted = true;
    }
});

// Heart trail on mouse move
let lastHeart = 0;
document.addEventListener("mousemove", (e) => {
    const now = Date.now();
    if (now - lastHeart < 70) return; // limit spawn rate

    lastHeart = now;

    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 800);
});
</script>

</body>
</html>
